{% extends 'base.html' %}

{% block title %}Upload Document - Django RAG{% endblock %}

{% block content %}
<h1 class="mb-4">Upload Document</h1>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_title" class="form-label">Title</label>
                <input type="text" class="form-control" id="id_title" name="title" placeholder="Enter document title">
            </div>
            <div class="mb-3">
                <label for="id_file" class="form-label">File</label>
                <input type="file" class="form-control" id="id_file" name="file" accept=".txt,.pdf" required>
                <small class="text-muted">Supported formats: .txt, .pdf</small>
            </div>
            <button type="submit" class="btn btn-primary">Upload & Process</button>
            <a href="{% url 'document_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
